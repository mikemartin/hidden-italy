nav:
  content:
    'content::assets':
      action: '@modify'
      reorder: true
      children:
        'content::assets::images': '@inherit'
        'content::assets::files': '@inherit'
        'content::assets::social_images': '@inherit'
collections:
  tours:
    view: list
    columns:
      - title
      - location
      - days
      - tour_types
      - status
    filters:
      guided:
        display: Guided
        filters:
          fields:
            tour_types:
              operator: like
              term:
                - 'tour_types::guided'
      self_guided:
        display: Self-guided
        filters:
          fields:
            tour_types:
              operator: like
              term:
                - 'tour_types::self-guided'