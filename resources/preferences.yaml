nav:
  content:
    'content::collections':
      action: '@modify'
      reorder:
        - 'content::collections::pages'
        - 'content::collections::guided_tours'
        - 'content::collections::self_guided_tours'
        - 'content::collections::benefits'
        - 'content::collections::people'
    'content::assets':
      action: '@modify'
      reorder:
        - 'content::assets::images'
        - 'content::assets::files'
        - 'content::assets::social_images'
        - 'content::assets::assets'
        - 'content::assets::favicons'
        - 'content::assets::icons'
collections:
  guided:
    view: list
    columns:
      - title
      - location
      - days
      - og_image
      - status
    filters:
      northern_italy:
        display: 'Northern Italy'
        filters:
          fields:
            locations:
              operator: like
              term:
                - 'locations::northern-italy'
      central_italy:
        display: 'Central Italy'
        filters:
          fields:
            locations:
              operator: like
              term:
                - 'locations::central-italy'
      southern_italy:
        display: 'Southern Italy'
        filters:
          fields:
            locations:
              operator: like
              term:
                - 'locations::southern-italy'
  self-guided:
    view: list
    columns:
      - title
      - location
      - days
      - og_image
      - status
    filters:
      northern_italy:
        display: 'Northern Italy'
        filters:
          fields:
            locations:
              operator: like
              term:
                - 'locations::northern-italy'
      central_italy:
        display: 'Central Italy'
        filters:
          fields:
            locations:
              operator: like
              term:
                - 'locations::central-italy'
      southern_italy:
        display: 'Southern Italy'
        filters:
          fields:
            locations:
              operator: like
              term:
                - 'locations::southern-italy'
