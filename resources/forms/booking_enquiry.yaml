content_sender:
  show_submitted_data: false
  email_text:
    -
      type: paragraph
      content:
        -
          type: text
          text: 'Hi {{ first_name or name }},'
    -
      type: paragraph
      content:
        -
          type: text
          text: 'Thank you for your booking enquiry. We have received the details of your selected tour and will be in touch shortly with more information.'
    -
      type: paragraph
      content:
        -
          type: text
          text: 'Best regards,'
    -
      type: paragraph
      content:
        -
          type: text
          text: 'The Hidden Italy team'
content_owner:
  show_submitted_data: true
title: 'Booking enquiry'
honeypot: fax
email:
  -
    id: bookingOwner
    to: info@hiddenitaly.com
    reply_to: '{{ email }}'
    subject: 'New booking enquiry — {{ tour or "Hidden Italy" }}'
    html: email/form_owner
    text: email/form_owner_text
  -
    id: bookingSender
    to: '{{ email }}'
    reply_to: info@hiddenitaly.com
    subject: 'We''ve received your booking enquiry'
    html: email/form_sender
    text: email/form_sender_text
