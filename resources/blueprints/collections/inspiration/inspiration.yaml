title: Inspiration
tabs:
  main:
    display: Main
    sections:
      -
        fields:
          -
            handle: title
            field:
              type: text
              required: true
              display: Title
              validate:
                - required
          -
            handle: image
            field:
              container: assets
              folder: tips
              mode: grid
              max_files: 1
              type: assets
              display: Image
          -
            handle: lead
            field:
              type: textarea
              display: Lead
              instructions: 'A 1&ndash;2 sentence dek shown under the headline on article cards and on the article page itself.'
          -
            import: article
  sidebar:
    display: Sidebar
    sections:
      -
        fields:
          -
            handle: slug
            field:
              type: slug
              localizable: true
              validate: 'max:200'
      -
        display: Taxonomy
        fields:
          -
            handle: categories
            field:
              type: terms
              taxonomies:
                - categories
              display: Categories
              mode: select
              create: true

