title: Tour
tabs:
  main:
    display: Main
    sections:
      -
        fields:
          -
            handle: title
            field:
              type: hidden
              required: false
          -
            handle: region
            field:
              type: text
              display: Region
              validate:
                - required
          -
            handle: name
            field:
              type: text
              validate:
                - required
              display: Name
          -
            handle: teaser
            field:
              character_limit: 90
              type: text
              display: Teaser
          -
            handle: image
            field:
              container: assets
              folder: tours
              dynamic: slug
              restrict: true
              mode: grid
              max_files: 1
              type: assets
              display: Image
          -
            handle: start_location
            field:
              type: simple_address
              display: 'Start Location'
              width: 50
              instructions: 'Where the tour starts. (e.g. "Rome")'
              placeholder: 'Search a town or city…'
              countries:
                - it
              exclude_fields:
                - providedBy
                - bounds
                - countryCode
          -
            handle: finish_location
            field:
              type: simple_address
              display: 'Finish Location'
              width: 50
              instructions: 'Where the tour finishes. (e.g. "Termol)'
              placeholder: 'Search a town or city…'
              countries:
                - it
              exclude_fields:
                - providedBy
                - bounds
                - countryCode
          -
            handle: now_open
            field:
              type: toggle
              display: 'Now open'
              instructions: 'Show a "Now open" badge on the tour card to flag that bookings are currently being taken.'
              width: 50
      -
        display: Summary
        collapsed: true
        fields:
          -
            handle: summary
            field:
              buttons:
                - bold
                - italic
                - unorderedlist
                - orderedlist
                - removeformat
                - anchor
              remove_empty_nodes: false
              type: bard
              display: Summary
              reading_time: true
              word_count: true
          -
            handle: inclusions
            field:
              type: list
              display: Inclusions
          -
            handle: gallery
            field:
              container: assets
              dynamic: slug
              mode: grid
              max_files: 12
              type: assets
              display: Gallery
              instructions: 'Add at least 5 photos of people in action, and show different angles.'
              folder: tours
              restrict: true
      -
        display: 'Page Builder'
        fields:
          -
            import: tour_builder
  sidebar:
    display: Sidebar
    sections:
      -
        fields:
          -
            handle: slug
            field:
              type: slug
              localizable: true
              validate: 'max:200'
              show_regenerate: true
          -
            handle: price
            field:
              type: text
              display: Price
              instructions: 'Free-form, e.g. "$4,950 AUD".'
          -
            handle: show_from
            field:
              type: toggle
              display: 'Show "From" prefix'
              default: true
              instructions: 'Prefixes the price with "From " when the tour has variants or starting prices.'
          -
            handle: days
            field:
              type: integer
              display: Days
              validate:
                - required
                - integer
          -
            handle: grade
            field:
              max: 5
              type: range
              display: Grade
              append: '/ 5'
          -
            handle: filter_grade
            field:
              type: select
              display: 'Walking Grade Filter'
              options:
                moderate: 'Moderate (0-2)'
                intermediate: 'Intermediate (3-4)'
                challenging: 'Challenging (5)'
              instructions: 'Used only for filtering; not part of entry data.'
              visibility: hidden
              listable: false
          -
            handle: simple_likes
            field:
              type: simple_likes
              display: Likes
              allow_guest_likes: true
      -
        display: Availability
        fields:
          -
            handle: availability_text
            field:
              type: textarea
              display: Availability
              instructions: 'Free-form availability note shown under the tour name (e.g. "Superior accommodation available").'
      -
        display: Taxonomy
        fields:
          -
            handle: seasons
            field:
              type: terms
              taxonomies:
                - seasons
              display: Seasons
              create: false
              mode: select
          -
            handle: locations
            field:
              type: terms
              taxonomies:
                - locations
              display: Location
              max_items: 1
              create: false
              mode: select
          -
            handle: landscapes
            field:
              type: terms
              taxonomies:
                - landscapes
              display: Landscapes
              create: false
              mode: select
