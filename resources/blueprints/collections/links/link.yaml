title: Links
tabs:
  main:
    display: Main
    sections:
      -
        fields:
          -
            handle: title
            field:
              type: text
              required: true
              display: Title
              validate:
                - required
          -
            handle: subtitle
            field:
              type: text
              display: Subtitle
          -
            handle: link
            field:
              type: text
              display: Link
              instructions: 'External URL the image links to.'
              input_type: url
              width: 50
  sidebar:
    display: Sidebar
    sections:
      -
        fields:
          -
            handle: image
            field:
              container: assets
              mode: grid
              max_files: 1
              type: assets
              display: Image
              listable: true
          -
            handle: slug
            field:
              type: slug
              localizable: true
              validate: 'max:200'
          -
            handle: date
            field:
              type: date
              required: true
              default: now
              validate:
                - required
