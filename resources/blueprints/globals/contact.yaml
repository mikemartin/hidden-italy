tabs:
  main:
    display: Main
    sections:
      -
        display: 'Contact details'
        instructions: 'Used in the footer "Get in touch" column.'
        fields:
          -
            handle: email
            field:
              type: text
              input_type: email
              localizable: true
              display: Email
              instructions: 'Primary contact email.'
              width: 50
          -
            handle: address
            field:
              type: textarea
              localizable: true
              display: Address
              instructions: 'Multi-line. Each line break shows as a new line in the footer.'
              width: 50
          -
            handle: phones
            field:
              type: replicator
              localizable: true
              display: Phone numbers
              button_label: 'Add phone number'
              collapse: accordion
              instructions: 'Each phone is shown as "Label +number" in the footer.'
              sets:
                main:
                  display: Main
                  sets:
                    phone:
                      display: Phone
                      fields:
                        -
                          handle: label
                          field:
                            type: text
                            display: Label
                            instructions: 'e.g. "Guided Tours" or "Self-guided Tours".'
                            width: 50
                            validate:
                              - required
                        -
                          handle: number
                          field:
                            type: text
                            input_type: tel
                            display: Number
                            instructions: 'Include the country code, e.g. "+61 457 427 472".'
                            width: 50
                            validate:
                              - required
      -
        display: Office
        instructions: 'Address details and map coordinates for the Contact page.'
        fields:
          -
            handle: office_label
            field:
              type: text
              localizable: true
              display: 'Office label'
              instructions: 'Section header above the address on the Contact page (e.g. "Sydney Office").'
              default: 'Sydney Office'
              width: 50
          -
            handle: office_appointment_only
            field:
              type: text
              localizable: true
              display: 'Appointment-only note'
              instructions: 'Small note shown under the address on the Contact page.'
              default: 'By appointment only'
              width: 50
          -
            handle: office_lat
            field:
              type: float
              display: 'Office latitude'
              instructions: 'Decimal latitude of the office, used for the contact page map (e.g. -33.8893).'
              width: 50
          -
            handle: office_lng
            field:
              type: float
              display: 'Office longitude'
              instructions: 'Decimal longitude of the office, used for the contact page map (e.g. 151.1985).'
              width: 50
      -
        display: Newsletter
        instructions: 'Copy shown above the newsletter sign-up in the footer.'
        fields:
          -
            handle: newsletter_heading
            field:
              type: text
              localizable: true
              display: Heading
              default: 'Subscribe to our Newsletter'
          -
            handle: newsletter_text
            field:
              type: textarea
              localizable: true
              display: Description
              default: "Sign up to get travel tips and inspiration delivered right to your inbox."
