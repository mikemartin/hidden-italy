tabs:
  main:
    display: Main
    sections:
      -
        fields:
          -
            handle: name
            field:
              display: Name
              type: text
              validate:
                - required
                - 'min:2'
              localizable: true
              width: 66
          -
            handle: email
            field:
              display: 'Email address'
              type: text
              validate:
                - required
                - email
              localizable: true
              width: 33
          -
            handle: phone
            field:
              display: 'Phone number'
              type: text
              validate:
                - 'nullable'
                - 'string'
                - 'max:50'
              localizable: true
              width: 33
          -
            handle: tour
            field:
              display: Tour
              type: text
              validate:
                - 'nullable'
                - 'string'
                - 'max:255'
              instructions: 'Title or slug of the tour the enquiry is about.'
              localizable: true
              width: 100
          -
            handle: message_body
            field:
              display: Message
              type: textarea
              validate:
                - required
                - 'min:5'
              localizable: true
          -
            handle: user_id
            field:
              display: 'User ID'
              type: text
              instructions: 'Linked Hidden Italy user (when the enquiry was submitted while logged in).'
              visibility: hidden
              read_only: true
          -
            handle: consent
            field:
              inline_label: 'I agree that my submitted data is being collected and stored.'
              display: Consent
              type: toggle
              validate:
                - accepted
              visibility: hidden
