tabs:
  main:
    display: Main
    sections:
      -
        fields:
          -
            handle: name
            field:
              display: Name
              type: text
              validate:
                - required
                - 'min:2'
              localizable: true
              listable: true
          -
            handle: email
            field:
              display: 'Email address'
              type: text
              validate:
                - required
                - email
              localizable: true
              width: 50
              listable: true
          -
            handle: phone
            field:
              display: 'Phone number'
              type: text
              validate:
                - nullable
                - string
                - 'max:50'
              localizable: true
              width: 50
          -
            handle: tour
            field:
              display: Tour
              type: text
              validate:
                - nullable
                - string
                - 'max:255'
              instructions: 'Title or slug of the tour the enquiry is about.'
              localizable: true
              listable: true
          -
            handle: message_body
            field:
              display: 'Travel plans'
              instructions: 'Number of travellers, preferred bedding, duration, travel dates — anything that helps us plan a response.'
              type: textarea
              validate:
                - required
                - 'min:5'
              localizable: true
          -
            handle: newsletter
            field:
              inline_label: 'Sign me up for email newsletter'
              display: Newsletter
              type: toggle
              localizable: true
              hide_display: true
          -
            handle: user_id
            field:
              display: 'User ID'
              type: text
              input_type: hidden
              instructions: 'Linked Hidden Italy user (when the enquiry was submitted while logged in).'
              visibility: hidden
