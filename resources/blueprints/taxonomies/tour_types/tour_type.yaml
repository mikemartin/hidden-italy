title: 'Tour Type'
tabs:
  main:
    display: Main
    sections:
      -
        fields:
          -
            handle: title
            field:
              type: text
              required: true
              validate:
                - required
          -
            handle: image
            field:
              container: assets
              folder: tour-types
              max_files: 1
              type: assets
              display: Image
              instructions: 'Hero image used on the Tour Types card on the homepage.'
              mode: grid
  sidebar:
    display: Sidebar
    sections:
      -
        fields:
          -
            handle: slug
            field:
              type: slug
              required: true
              validate:
                - required
                - 'max:200'
