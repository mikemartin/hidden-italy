{{#
    @name Logo
    @desc The Hidden Italy wordmark. Renders as a CSS-masked SVG so the
          colour is inherited from the surrounding `text-*` utility.
          Pass a `class` for sizing (e.g. `h-7 lg:h-12`); width follows
          from the wordmark's intrinsic aspect ratio.
#}}

<!-- /components/_logo.antlers.html -->
<a
    aria-label="{{ trans:strings.home }}"
    href="{{ site:url }}"
    wire:navigate
    class="inline-flex"
>
    <span
        class="brand-wordmark inline-block select-none {{ class }}"
        role="presentation"
        aria-hidden="true"
    ></span>
</a>
<!-- End: /components/_logo.antlers.html -->
