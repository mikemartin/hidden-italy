<!-- /vendor/statamic/forms/fields/checkboxes.antlers.html -->
<div
    :aria-invalid="form.invalid('{{ handle }}')"
    class="flex {{ inline ? 'flex-wrap gap-x-6 gap-y-3' : 'flex-col gap-3' }}"
    id="{{ handle }}"
    {{ instructions ?= 'aria-describedBy="{handle}-instructions"' }}
>
    {{ foreach:options as="value|label" }}
        <label class="inline-flex items-start gap-3 cursor-pointer group">
            <input
                x-model="form.{{ handle }}"
                @change="form.validate('{{ handle }}')"
                :class="{
                    'border-error focus:ring-error/20': form.invalid('{{ handle }}'),
                    'border-neutral-300 group-hover:border-neutral-400 focus:ring-accent': !form.invalid('{{ handle }}')
                }"
                class="form-checkbox mt-0.5 size-5 shrink-0 rounded bg-card text-accent border focus:ring-2 focus:ring-offset-0 transition"
                type="checkbox"
                name="{{ handle }}[]"
                value="{{ value }}"
                {{ (old | in_array(value)) ?= 'checked' }}
            >
            <span class="text-base leading-[1.6] text-foreground">
                {{ trans :key="label" }}
            </span>
        </label>
    {{ /foreach:options }}
</div>
<!-- End: /vendor/statamic/forms/fields/checkboxes.antlers.html -->
