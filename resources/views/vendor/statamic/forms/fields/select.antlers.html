<!-- /vendor/statamic/forms/fields/select.antlers.html -->
<div class="relative">
    <select
        x-model="form.{{ handle }}"
        @change="form.validate('{{ handle }}')"
        :aria-invalid="form.invalid('{{ handle }}')"
        :class="{
            'border-error focus:border-error focus:ring-error/20': form.invalid('{{ handle }}'),
            'border-text/20 focus:border-accent focus:ring-accent': !form.invalid('{{ handle }}')
        }"
        class="block w-full appearance-none rounded-full bg-card pl-5 pr-12 py-3 text-base lg:text-lg text-foreground border focus:outline-none focus:ring-2 transition"
        id="{{ handle }}"
        name="{{ handle }}{{ multiple ?= "[]" }}"
        {{ instructions ?= 'aria-describedBy="{handle}-instructions"' }}
        {{ multiple ?= "multiple" }}
        {{ autocomplete ?= 'autocomplete="{autocomplete}"' }}
    >
        {{ unless multiple }}
            <option value>{{ trans key="Please select..." }}</option>
        {{ /unless }}
        {{ foreach:options as="value|label" }}
            <option
                value="{{ value }}"
                {{ if old|in_array(value) or old === value }}
                    selected
                {{ /if }}
            >
                {{ trans :key="label" }}
            </option>
        {{ /foreach:options }}
    </select>
    <x-lucide-chevron-down class="absolute right-4 top-1/2 -translate-y-1/2 w-5 h-5 text-accent pointer-events-none" />
</div>
<!-- End: /vendor/statamic/forms/fields/select.antlers.html -->
