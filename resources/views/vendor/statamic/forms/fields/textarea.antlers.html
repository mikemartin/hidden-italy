<!-- /vendor/statamic/forms/fields/textarea.antlers.html -->
<textarea
    x-model="form.{{ handle }}"
    @change="form.validate('{{ handle }}')"
    :aria-invalid="form.invalid('{{ handle }}')"
    :class="{
        'border-error focus:border-error focus:ring-error/20': form.invalid('{{ handle }}'),
        'border-neutral-300 focus:border-accent focus:ring-accent': !form.invalid('{{ handle }}')
    }"
    class="block w-full rounded-2xl bg-card px-5 py-3 text-base lg:text-lg text-foreground border placeholder:text-neutral-400 focus:outline-none focus:ring-2 transition field-sizing-content"
    id="{{ handle }}"
    name="{{ handle }}"
    rows="5"
    {{ placeholder ?= 'placeholder="{placeholder}"' }}
    {{ instructions ?= 'aria-describedBy="{handle}-instructions"' }}
    {{ character_limit ?= 'maxlength="{character_limit}"' }}
    {{ autocomplete ?= 'autocomplete="{autocomplete}"' }}
>{{ old }}</textarea>
<!-- End: /vendor/statamic/forms/fields/textarea.antlers.html -->
