<!-- /vendor/statamic/forms/fields/default.antlers.html -->
<input
    x-model="form.{{ handle }}"
    @change="form.validate('{{ handle }}')"
    :aria-invalid="form.invalid('{{ handle }}')"
    :class="{
        'border-error focus:border-error focus:ring-error/20': form.invalid('{{ handle }}'),
        'border-text/20 focus:border-accent focus:ring-accent': !form.invalid('{{ handle }}')
    }"
    class="
        block w-full rounded-full bg-card px-5 py-3 text-base lg:text-lg text-foreground border placeholder:text-text/40
        focus:outline-none focus:ring-2 transition
        {{ class }}
    "
    id="{{ handle }}"
    name="{{ handle }}"
    type="{{ input_type ?? 'text' }}"
    {{ placeholder ?= 'placeholder="{placeholder}"' }}
    {{ instructions ?= 'aria-describedBy="{handle}-instructions"' }}
    {{ character_limit ?= 'maxlength="{character_limit}"' }}
    {{ autocomplete ?= 'autocomplete="{autocomplete}"' }}
    {{ old ?= 'value="{old}"' }}
/>
<!-- End: /vendor/statamic/forms/fields/default.antlers.html -->
