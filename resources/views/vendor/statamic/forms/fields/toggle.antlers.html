<!-- /vendor/statamic/forms/fields/toggle.antlers.html -->
<label
    class="inline-flex items-start gap-3 cursor-pointer group"
    :aria-invalid="form.invalid('{{ handle }}')"
    {{ instructions ?= 'aria-describedBy="{handle}-instructions"' }}
>
    {{# Hidden 0-value so unchecked toggles still submit a value. #}}
    <input type="hidden" name="{{ handle }}" value="0">
    <input
        x-model="form.{{ handle }}"
        @change="form.validate('{{ handle }}')"
        :class="{
            'border-error focus:ring-error/20': form.invalid('{{ handle }}'),
            'border-text/20 group-hover:border-text/40 focus:ring-accent': !form.invalid('{{ handle }}')
        }"
        class="form-checkbox mt-0.5 size-5 shrink-0 rounded bg-card text-accent border focus:ring-2 focus:ring-offset-0 transition"
        type="checkbox"
        name="{{ handle }}"
        value="1"
        id="{{ handle }}"
        {{ (!old && default) ?= 'checked' }}
    >
    {{ if inline_label }}
        <span class="text-base font-medium leading-[1.6] text-foreground">
            {{ trans :key="inline_label" }}
            {{ if handle === 'consent' }}
                {{ if configuration:privacy_statement_type == 'entry' }}
                    <a class="underline decoration-accent hover:text-accent" href="{{ configuration:privacy_statement_entry:url }}">{{ trans:strings.consent_learn_more }}</a>
                {{ elseif configuration:privacy_statement_type == 'pdf' }}
                    <a class="underline decoration-accent hover:text-accent" href="{{ configuration:privacy_statement_asset }}" target="_blank">{{ trans:strings.consent_learn_more }}</a>
                {{ /if }}
            {{ /if }}
        </span>
    {{ /if }}
</label>
<!-- End: /vendor/statamic/forms/fields/toggle.antlers.html -->
