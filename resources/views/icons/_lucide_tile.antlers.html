{{#
    @name Icons Lucide Tile
    @desc A single lucide icon tile. Pass the <x-lucide-*> blade component via slot and the icon name as a param. Clicking the tile serializes the inline SVG and triggers a download as {name}.svg.
    @param* name The icon name (used as label and download filename).
#}}

<!-- /icons/_lucide_tile.antlers.html -->
<li>
    <button
        type="button"
        x-data
        @click="
            const svg = $el.querySelector('svg');
            const source = new XMLSerializer().serializeToString(svg);
            const blob = new Blob(['<?xml version=\'1.0\' encoding=\'UTF-8\'?>\n' + source], {type: 'image/svg+xml;charset=utf-8'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = '{{ name }}.svg';
            document.body.appendChild(a);
            a.click();
            a.remove();
            URL.revokeObjectURL(url);
        "
        class="w-full flex flex-col items-center gap-3 p-6 border border-neutral/10 rounded-lg hover:border-primary hover:bg-neutral-50 transition-colors cursor-pointer"
        aria-label="Download {{ name }}.svg"
    >
        {{ slot }}
        <code class="text-xs leading-[1.6] text-neutral/70 font-mono text-center break-all">{{ name }}</code>
    </button>
</li>
<!-- End: /icons/_lucide_tile.antlers.html -->
