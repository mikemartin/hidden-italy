title: Cards
fields:
  -
    handle: heading
    field:
      type: text
      localizable: true
      display: Heading
  -
    handle: text
    field: common.text_plain
  -
    handle: cards
    field:
      reorderable: true
      type: replicator
      localizable: true
      display: Cards
      replicator_preview: false
      collapse: accordion
      hide_display: true
      button_label: 'Add card'
      sets:
        cards:
          display: Cards
          sets:
            card:
              display: Card
              image: null
              fields:
                -
                  handle: image
                  field:
                    container: assets
                    max_files: 1
                    type: assets
                    mode: grid
                    localizable: true
                    display: Image
                    instructions: 'Optional landscape image displayed at the top of the card with a 4px inset.'
                -
                  handle: heading
                  field:
                    type: text
                    localizable: true
                    validate: required
                    display: Heading
                -
                  handle: text
                  field: common.text_plain
                  config:
                    display: Text
                -
                  handle: button
                  field: buttons.buttons
                  config:
                    display: Link
                    instructions: 'Renders as an inline link on the card.'
                    max_sets: 1
  -
    import: section_settings
