title: 'Section settings'
fields:
  -
    handle: section_background
    field:
      type: button_group
      localizable: true
      display: 'Section background'
      instructions: 'Wrap the section in a panel to showcase or highlight content against the parchment.'
      default: none
      width: 50
      validate:
        - required
      options:
        none: None
        light: 'Light panel'
  -
    handle: show_topography
    field:
      type: toggle
      localizable: true
      display: 'Topographic lines'
      instructions: 'Add the topographic line pattern to the panel background.'
      default: false
      width: 50
      unless:
        section_background: none
