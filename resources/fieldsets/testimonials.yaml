title: Testimonials
fields:
  -
    handle: heading
    field:
      type: text
      localizable: true
      display: Heading
      default: 'What our travellers are saying'
  -
    handle: text
    field: common.text_plain
  -
    handle: testimonials
    field:
      type: entries
      localizable: true
      display: Testimonials
      collection: testimonials
      max_items: 6
      instructions: 'Pick testimonials from the Testimonials collection. Three is the intended count for the homepage grid.'
      validate:
        - required
      collections:
        - testimonials
  -
    import: section_settings
