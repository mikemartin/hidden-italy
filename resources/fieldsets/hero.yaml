title: Hero
fields:
  -
    handle: headline
    field:
      type: textarea
      display: Headline
      instructions: 'Main headline overlaid on the hero image.'
  -
    handle: buttons
    field: buttons.buttons
    config:
      display: 'Call to action'
      max_sets: 1
  -
    handle: tour_photos
    field:
      collections:
        - guided
        - self-guided
      max_items: 4
      type: entries
      display: 'Tour Photos'
      instructions: 'Pick up to 4 tours. Each tour becomes one slide of the hero carousel — its main photo is the slide image and the tour name is shown as a caption.'
  -
    handle: overlay_opacity
    field:
      type: range
      display: 'Image overlay'
      instructions: 'Darkens the hero images so the headline stays legible. 0% = no overlay, 100% = solid black.'
      min: 0
      max: 100
      step: 1
      default: 30
      append: '%'
