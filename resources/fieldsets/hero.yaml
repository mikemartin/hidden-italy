title: Hero
fields:
  -
    handle: headline
    field:
      type: textarea
      display: Headline
      instructions: 'Main headline overlaid on the hero image.'
  -
    handle: buttons
    field: buttons.buttons
    config:
      display: 'Call to action'
      max_sets: 1
  -
    handle: tour_photos
    field:
      collections:
        - guided
        - self-guided
      max_items: 4
      type: entries
      display: 'Tour Photos'
      instructions: 'Pick up to 4 tours. Each slide uses that tour''s photo and its own Image overlay (slide opacity).'
