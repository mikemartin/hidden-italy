title: 'Testimonial and photo'
fields:
  -
    handle: image
    field:
      container: assets
      max_files: 1
      type: assets
      localizable: true
      display: Image
      instructions: 'Portrait or landscape image of the person. Sits behind the quote card on desktop.'
      mode: grid
      validate:
        - required
  -
    handle: quote
    field:
      type: textarea
      localizable: true
      display: Quote
      instructions: 'A single short paragraph. No surrounding quote marks — the design adds a styled opening mark.'
      validate:
        - required
  -
    handle: name
    field:
      type: text
      localizable: true
      display: Name
      validate:
        - required
  -
    handle: role
    field:
      type: text
      localizable: true
      display: Role
      instructions: 'e.g. ‘Director, Hidden Italy’.'
  -
    import: section_settings_with_dark
