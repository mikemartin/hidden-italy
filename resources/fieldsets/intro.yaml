title: 'Intro with benefits'
fields:
  -
    handle: eyebrow
    field:
      type: text
      localizable: true
      display: Eyebrow
      instructions: 'Small label above the heading. Optional.'
      width: 50
  -
    handle: heading
    field:
      type: text
      localizable: true
      display: Heading
      validate:
        - required
  -
    handle: intro
    field:
      buttons:
        - bold
        - italic
        - anchor
      type: bard
      localizable: true
      display: Intro
      instructions: 'Supporting paragraph below the heading.'
      remove_empty_nodes: true
      smart_typography: true
  -
    handle: benefits
    field:
      type: entries
      localizable: true
      display: Benefits
      collections:
        - benefits
      max_items: 6
      instructions: 'Pick benefits from the Benefits collection. Three is the intended count.'
      validate:
        - required
  -
    handle: buttons
    field: buttons.buttons
    config:
      display: 'Call to action'
      max_sets: 2
