title: 'Tour banner'
fields:
  -
    handle: region
    field:
      type: text
      localizable: true
      display: Region
      instructions: 'Small label shown above the headline (e.g. "Campania").'
      validate:
        - required
  -
    handle: heading
    field:
      type: text
      localizable: true
      display: Heading
      instructions: 'Large all-caps headline (e.g. "Amalfi Coast tour").'
      validate:
        - required
  -
    handle: location
    field:
      type: text
      localizable: true
      display: Location
      instructions: 'Map-pin caption shown along the bottom (e.g. "Positano, Amalfi Coast").'
      validate:
        - required
  -
    handle: image
    field:
      container: assets
      folder: tours
      max_files: 1
      type: assets
      localizable: true
      display: 'Background image'
      instructions: 'Full-bleed landscape image for the banner.'
      validate:
        - required
  -
    handle: buttons
    field: buttons.buttons
    config:
      display: 'Call to action'
      max_sets: 1
      validate:
        - required
