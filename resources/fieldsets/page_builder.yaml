title: 'Page builder'
fields:
  -
    handle: page_builder
    field:
      type: replicator
      localizable: true
      hide_display: true
      collapse: true
      listable: false
      display: 'Page builder'
      button_label: 'Add block'
      sets:
        image_and_text:
          display: 'Image and text'
          instructions: 'Image and text based blocks.'
          icon: hero-image-above-text
          sets:
            article:
              display: Article
              instructions: 'Long form content, can be expanded with media like figures, video, quotes or tables.'
              icon: text-formatting-image-bottom
              image: article.jpeg
              fields:
                -
                  import: article
        interactive:
          display: Interactive
          instructions: 'Interactive blocks.'
          icon: programming-script-code
          sets:
            form:
              display: Form
              instructions: 'Select and render a form.'
              icon: mail-chat-bubble-text
              image: form.jpeg
              fields:
                -
                  import: form
            cards:
              display: Cards
              instructions: 'Show linkable cards with text.'
              icon: link
              image: cards.jpeg
              fields:
                -
                  import: cards
        home:
          display: 'Marketing sections'
          instructions: 'Hero, intro, feature grids and CTA blocks used on the homepage and other landing pages.'
          icon: scenery
          sets:
            hero:
              display: Hero
              instructions: 'Full-bleed hero image with headline and CTA.'
              icon: hero-image-above-text
              fields:
                -
                  import: hero
            tour_banner:
              display: 'Tour banner'
              instructions: 'Full-bleed 700px banner with region label, headline, CTA and a map-pin location row.'
              icon: hero-image-above-text
              fields:
                -
                  import: tour_banner
            intro:
              display: 'Intro with benefits'
              instructions: 'Heading, intro copy and three benefit tiles pulled from the Benefits collection.'
              icon: text-formatting-image-bottom
              fields:
                -
                  import: intro
            tour_types:
              display: 'Tour types'
              instructions: 'Two linkable cards for the main tour types (e.g. Guided / Self-guided).'
              icon: travel-map
              fields:
                -
                  import: tour_types
            featured_tours:
              display: 'Featured tours'
              instructions: 'Curated grid or slider of tour entries.'
              icon: scenery
              fields:
                -
                  import: featured_tours
            testimonials:
              display: Testimonials
              instructions: 'Three testimonial entries side-by-side.'
              icon: favorite
              fields:
                -
                  import: testimonials
            travel_tips:
              display: 'Travel tips'
              instructions: 'Three article cards linking to blog/inspiration entries.'
              icon: text-formatting-image-bottom
              fields:
                -
                  import: travel_tips
            cta_banner:
              display: 'CTA banner'
              instructions: 'Full-bleed image with a centred headline and CTA button.'
              icon: link
              fields:
                -
                  import: cta_banner
