title: 'Page builder'
fields:
  -
    handle: page_builder
    field:
      type: replicator
      localizable: true
      hide_display: true
      collapse: true
      listable: false
      display: 'Page builder'
      button_label: 'Add block'
      sets:
        image_and_text:
          display: 'Image and text'
          instructions: 'Image and text based blocks.'
          icon: hero-image-above-text
          sets:
            content_with_image:
              display: 'Content with image'
              instructions: 'Side-by-side text and image — heading, body copy and a single supporting photo. Used for letter / story panels like “It started with a walk”.'
              icon: text-formatting-image-right
              fields:
                -
                  import: content_with_image
            testimonial_overlap:
              display: 'Testimonial — image overlap'
              instructions: 'Single quote on a parchment card overlapping a portrait image. Used for founder / director quotes.'
              icon: favorite
              fields:
                -
                  import: testimonial_overlap
            image_and_text:
              display: 'Image and text'
              instructions: 'Heading and body copy beside an image. Image side is configurable so the rows can alternate.'
              icon: text-formatting-image-bottom
              fields:
                -
                  import: image_and_text
        interactive:
          display: Interactive
          instructions: 'Interactive blocks.'
          icon: programming-script-code
          sets:
            form:
              display: Form
              instructions: 'Select and render a form.'
              icon: mail-chat-bubble-text
              image: form.jpeg
              fields:
                -
                  import: form
            contact:
              display: 'Contact details + form'
              instructions: 'Two-column block: address, phone, email, office map on the left and a Statamic form on the right.'
              icon: mail-chat-bubble-text
              fields:
                -
                  import: contact
            cards:
              display: Cards
              instructions: 'Show linkable cards with text.'
              icon: link
              image: cards.jpeg
              fields:
                -
                  import: cards
        home:
          display: 'Marketing sections'
          instructions: 'Hero, intro, feature grids and CTA blocks used on the homepage and other landing pages.'
          icon: scenery
          sets:
            tour_banner:
              display: 'Tour banner'
              instructions: 'Full-bleed 700px banner with region label, headline, CTA and a map-pin location row.'
              icon: hero-image-above-text
              fields:
                -
                  import: tour_banner
            intro:
              display: Benefits
              instructions: 'Heading, intro copy and a 3- or 4-column grid of benefit tiles pulled from the Benefits collection.'
              icon: text-formatting-image-bottom
              fields:
                -
                  import: intro
            icon_grid:
              display: 'Icon grid'
              instructions: 'Heading and a 3-column grid of inline icon tiles (icon + title + summary). Same layout as Tour Highlights but for any page.'
              icon: scenery
              fields:
                -
                  import: highlights
            stats:
              display: Stats
              instructions: 'Side title plus a 2-column grid of headline number + label tiles. Used for the About-page “covered some ground” panel.'
              icon: graph-bar-line-chart
              fields:
                -
                  import: stats
            people_grid:
              display: 'People grid'
              instructions: 'Centred heading and a 4-column grid of profile cards from the People collection. Each card opens a flyout bio.'
              icon: user-multiple
              fields:
                -
                  import: people_grid
            tour_types:
              display: 'Tour types'
              instructions: 'Two linkable cards for the main tour types (e.g. Guided / Self-guided).'
              icon: travel-map
              fields:
                -
                  import: tour_types
            featured_tours:
              display: 'Featured tours'
              instructions: 'Curated grid or slider of tour entries.'
              icon: scenery
              fields:
                -
                  import: featured_tours
            testimonials:
              display: Testimonials
              instructions: 'Three testimonial entries side-by-side.'
              icon: favorite
              fields:
                -
                  import: testimonials
            travel_tips:
              display: 'Travel tips'
              instructions: 'Three article cards linking to blog/inspiration entries.'
              icon: text-formatting-image-bottom
              fields:
                -
                  import: travel_tips
            cta_banner:
              display: 'CTA banner'
              instructions: 'Full-bleed image with a centred headline and CTA button.'
              icon: link
              fields:
                -
                  import: cta_banner
            faqs:
              display: FAQs
              instructions: 'Side-title accordion of frequently asked questions, with optional shared questions from the Questions collection.'
              icon: question
              fields:
                -
                  import: faqs
            walking_benefits:
              display: 'Walking benefits'
              instructions: 'Marker block — the panel itself (heading, intro, benefit tiles) is edited in the Guided / Self-guided globals. Add this block where you want it to render. Variant is picked from this listing page''s `tour collections`.'
              icon: scenery
              fields: []
