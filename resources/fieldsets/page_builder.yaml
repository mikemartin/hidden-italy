title: 'Page builder'
fields:
  -
    handle: page_builder
    field:
      type: replicator
      localizable: true
      hide_display: true
      collapse: true
      listable: false
      display: 'Page builder'
      button_label: 'Add block'
      sets:
        image_and_text:
          display: 'Image and text'
          instructions: 'Image and text based blocks.'
          icon: hero-image-above-text
          sets:
            article:
              display: Article
              instructions: 'Long form content, can be expanded with media like figures, video, quotes or tables.'
              icon: text-formatting-image-bottom
              image: article.jpeg
              fields:
                -
                  import: article
            content_with_image:
              display: 'Content with image'
              instructions: 'Side-by-side text and image — heading, body copy and a single supporting photo. Used for letter / story panels like “It started with a walk”.'
              icon: text-formatting-image-right
              fields:
                -
                  import: content_with_image
            testimonial_overlap:
              display: 'Testimonial — image overlap'
              instructions: 'Single quote on a parchment card overlapping a portrait image. Used for founder / director quotes.'
              icon: favorite
              fields:
                -
                  import: testimonial_overlap
        interactive:
          display: Interactive
          instructions: 'Interactive blocks.'
          icon: programming-script-code
          sets:
            form:
              display: Form
              instructions: 'Select and render a form.'
              icon: mail-chat-bubble-text
              image: form.jpeg
              fields:
                -
                  import: form
            cards:
              display: Cards
              instructions: 'Show linkable cards with text.'
              icon: link
              image: cards.jpeg
              fields:
                -
                  import: cards
        home:
          display: 'Marketing sections'
          instructions: 'Hero, intro, feature grids and CTA blocks used on the homepage and other landing pages.'
          icon: scenery
          sets:
            tour_banner:
              display: 'Tour banner'
              instructions: 'Full-bleed 700px banner with region label, headline, CTA and a map-pin location row.'
              icon: hero-image-above-text
              fields:
                -
                  import: tour_banner
            intro:
              display: 'Intro with benefits'
              instructions: 'Heading, intro copy and three benefit tiles pulled from the Benefits collection.'
              icon: text-formatting-image-bottom
              fields:
                -
                  import: intro
            stats:
              display: Stats
              instructions: 'Side title plus a 2-column grid of headline number + label tiles. Used for the About-page “covered some ground” panel.'
              icon: graph-bar-line-chart
              fields:
                -
                  import: stats
            people_grid:
              display: 'People grid'
              instructions: 'Centred heading and a 4-column grid of profile cards from the People collection. Each card opens a flyout bio.'
              icon: user-multiple
              fields:
                -
                  import: people_grid
            tour_types:
              display: 'Tour types'
              instructions: 'Two linkable cards for the main tour types (e.g. Guided / Self-guided).'
              icon: travel-map
              fields:
                -
                  import: tour_types
            featured_tours:
              display: 'Featured tours'
              instructions: 'Curated grid or slider of tour entries.'
              icon: scenery
              fields:
                -
                  import: featured_tours
            testimonials:
              display: Testimonials
              instructions: 'Three testimonial entries side-by-side.'
              icon: favorite
              fields:
                -
                  import: testimonials
            travel_tips:
              display: 'Travel tips'
              instructions: 'Three article cards linking to blog/inspiration entries.'
              icon: text-formatting-image-bottom
              fields:
                -
                  import: travel_tips
            cta_banner:
              display: 'CTA banner'
              instructions: 'Full-bleed image with a centred headline and CTA button.'
              icon: link
              fields:
                -
                  import: cta_banner
