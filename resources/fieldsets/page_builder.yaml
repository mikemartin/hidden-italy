title: 'Page builder'
fields:
  -
    handle: page_builder
    field:
      type: replicator
      localizable: true
      hide_display: true
      collapse: true
      listable: false
      display: 'Page builder'
      button_label: 'Add block'
      sets:
        image_and_text:
          display: 'Image and text'
          instructions: 'Two-column layouts pairing copy with a photo.'
          icon: hero-image-above-text
          sets:
            testimonial_overlap:
              display: 'Testimonial — image overlap'
              instructions: 'Single quote on a parchment card overlapping a portrait image. Used for founder / director quotes.'
              icon: favorite
              image: testimonial_overlap.png
              fields:
                -
                  import: testimonial_overlap
            image_and_text:
              display: 'Image and text'
              instructions: 'Heading and body copy beside an image. Image side, aspect (landscape / tall) and surface (plain / card) are configurable so the rows can alternate or read as a story panel.'
              icon: text-formatting-image-bottom
              image: image_and_text.png
              fields:
                -
                  import: image_and_text
        interactive:
          display: Interactive
          instructions: 'Blocks that visitors interact with — forms, contact details and linkable cards.'
          icon: programming-script-code
          sets:
            form:
              display: Form
              instructions: 'Statamic form with live Precognition validation, honeypot and grid field layouts. Pick which form to render.'
              icon: mail-chat-bubble-text
              image: form.png
              fields:
                -
                  import: form
            contact:
              display: 'Contact details + form'
              instructions: 'Two-column block: address, phone, email, office map on the left and a Statamic form on the right.'
              icon: mail-chat-bubble-text
              image: contact.png
              fields:
                -
                  import: contact
            cards:
              display: Cards
              instructions: 'Optional heading and intro above a 1–3-column grid of linkable cards (image, heading, text, inline link).'
              icon: link
              image: cards.png
              fields:
                -
                  import: cards
        home:
          display: 'Marketing sections'
          instructions: 'Intro, feature grids, photo cards, testimonials and CTA blocks used across landing pages.'
          icon: scenery
          sets:
            benefits:
              display: Benefits
              instructions: 'Heading, intro copy and a 3- or 4-column grid of benefit tiles pulled from the Benefits collection.'
              icon: text-formatting-image-bottom
              image: benefits.png
              fields:
                -
                  import: benefits
            icon_grid:
              display: 'Icon grid'
              instructions: 'Heading and a 3-column grid of inline icon tiles (icon + title + summary). Same layout as Tour Highlights but for any page.'
              icon: scenery
              image: icon_grid.png
              fields:
                -
                  import: icon_grid
            stats:
              display: Stats
              instructions: 'Side title plus a 2-column grid of number + label tiles. Used for the About page "covered some ground" panel.'
              icon: graph-bar-line-chart
              image: stats.png
              fields:
                -
                  import: stats
            people_grid:
              display: 'People grid'
              instructions: 'Centred heading and a 4-column grid of profile cards from the People collection. Each card opens a flyout bio.'
              icon: user-multiple
              image: people.png
              fields:
                -
                  import: people_grid
            photo_cards:
              display: 'Photo cards'
              instructions: 'Up to three large image cards linking out to pages or specific tours. Pages show a tour-count chip; tours show their region.'
              icon: travel-map
              image: photo_cards.png
              fields:
                -
                  import: photo_cards
            featured_tours:
              display: 'Featured tours'
              instructions: 'Curated 3-column grid of tour entries, swipeable on mobile. Pick the tours you want to highlight.'
              icon: scenery
              image: featured_tours.png
              fields:
                -
                  import: featured_tours
            testimonials:
              display: Testimonials
              instructions: 'Optional heading and intro above three testimonial cards; swipeable on mobile. Pulls entries from the Testimonials collection.'
              icon: favorite
              image: testimonials.png
              fields:
                -
                  import: testimonials
            travel_tips:
              display: 'Travel tips'
              instructions: 'Three article cards linking to Inspiration entries.'
              icon: text-formatting-image-bottom
              image: travel_tips.png
              fields:
                -
                  import: travel_tips
            faqs:
              display: FAQs
              instructions: 'Side-title heading and intro beside an accordion of frequently asked questions. Common questions are appended from the Guided / Self-guided globals when the toggle is on.'
              icon: question
              image: faqs.png
              fields:
                -
                  import: faqs
            walking_benefits:
              display: 'Walking benefits'
              instructions: 'The panel content lives in the Guided / Self-guided globals. Drop it where you want the panel to render; the variant is picked from this listing page''s Tour collections field.'
              icon: scenery
              type: walking_benefits
              image: walking_benefits.png
              fields:
                -
                  handle: tour_type
                  field:
                    type: button_group
                    display: 'Tour Type'
                    default: auto
                    options:
                      self-guided: 'Self-guided'
                      guided: Guided
                      auto: Automatic
                    instructions: 'Display benefits by Tour Type, or pick `Automatic` and we''ll show the right ones automatically.'
                -
                  import: section_settings
