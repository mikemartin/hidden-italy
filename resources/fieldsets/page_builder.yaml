title: 'Page builder'
fields:
  -
    handle: page_builder
    field:
      type: replicator
      localizable: true
      hide_display: true
      collapse: true
      listable: false
      display: 'Page builder'
      button_label: 'Add block'
      sets:
        image_and_text:
          display: 'Image and text'
          instructions: 'Two-column layouts pairing copy with a photo.'
          icon: hero-image-above-text
          sets:
            testimonial_overlap:
              display: 'Testimonial and photo'
              instructions: 'Single quote on a card overlapping a photo.'
              icon: favorite
              image: testimonial_overlap.png
              fields:
                -
                  import: testimonial_overlap
            image_and_text:
              display: 'Image and text'
              instructions: 'Heading and body copy beside an image.'
              icon: text-formatting-image-bottom
              image: image_and_text.png
              fields:
                -
                  import: image_and_text
        home:
          display: 'Marketing sections'
          instructions: 'Intro, feature grids, photo cards, testimonials and CTA blocks used across landing pages.'
          icon: megaphone
          sets:
            benefits:
              display: Benefits
              instructions: 'Three or four column grid of benefits.'
              icon: text-formatting-image-bottom
              image: benefits.png
              fields:
                -
                  import: benefits
            walking_benefits:
              display: 'Walking benefits'
              instructions: 'Display Guided and Self-guided tour benefits.'
              icon: scenery
              image: walking_benefits.png
              fields:
                -
                  handle: tour_type
                  field:
                    type: button_group
                    display: 'Tour Type'
                    default: auto
                    options:
                      self-guided: Self-guided
                      guided: Guided
                      auto: Automatic
                    instructions: "Display benefits by Tour Type, or pick `Automatic` and we'll show the right ones automatically."
                -
                  import: section_settings
            icon_grid:
              display: 'Icon grid'
              instructions: 'Three column grid of icon tiles.'
              icon: scenery
              image: icon_grid.png
              fields:
                -
                  import: icon_grid
            stats:
              display: Stats
              instructions: 'Two column grid of number and label tiles.'
              icon: graph-bar-line-chart
              image: stats.png
              fields:
                -
                  import: stats
            people_grid:
              display: 'People grid'
              instructions: 'Four column grid of profile cards. Each card opens a flyout bio.'
              icon: user-multiple
              image: people.png
              fields:
                -
                  import: people_grid
            photo_cards:
              display: 'Photo cards'
              instructions: 'Photo cards to link to pages or tours.'
              icon: travel-map
              image: photo_cards.png
              fields:
                -
                  import: photo_cards
            featured_tours:
              display: 'Featured tours'
              instructions: 'Carousel of tours you want to highlight.'
              icon: scenery
              image: featured_tours.png
              fields:
                -
                  import: featured_tours
            testimonials:
              display: Testimonials
              instructions: 'Three column grid of testimonial cards.'
              icon: favorite
              image: testimonials.png
              fields:
                -
                  import: testimonials
            travel_tips:
              display: 'Travel tips'
              instructions: 'Carousel of Travel Tips and Inspiration you want to highlight.'
              icon: text-formatting-image-bottom
              image: travel_tips.png
              fields:
                -
                  import: travel_tips
            faqs:
              display: FAQs
              instructions: 'Accordion of frequently asked questions.'
              icon: question
              image: faqs.png
              fields:
                -
                  import: faqs
        interactive:
          display: Interactive
          instructions: 'Blocks that visitors interact with — forms, contact details and linkable cards.'
          icon: programming-script-code
          sets:
            form:
              display: Form
              instructions: 'Statamic form with grid field layouts.'
              icon: mail-chat-bubble-text
              image: form.png
              fields:
                -
                  import: form
            contact:
              display: 'Contact details and form'
              instructions: 'Contact details and office map from Globals.'
              icon: mail-chat-bubble-text
              image: contact.png
              fields:
                -
                  import: contact
            cards:
              display: Cards
              instructions: 'Two or three column grid of linkable cards.'
              icon: link
              image: cards.png
              fields:
                -
                  import: cards
