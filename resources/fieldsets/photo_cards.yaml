title: 'Photo cards'
# Shared section-settings convention — `section_background`
# (none|light|dark) and `show_topography` toggle live at the bottom
# of the blueprint. Imports the `with_dark` variant since photo cards
# work on the deep-blue panel; the dark rendering itself lives in
# `_block.antlers.html` so future dark-capable sections just swap
# their import to match.
fields:
  -
    handle: heading
    field:
      type: text
      localizable: true
      display: Heading
      default: 'Choose your adventure'
  -
    handle: photo_cards
    field:
      type: entries
      collections:
        - pages
        - guided
        - self-guided
      max_items: 4
      display: 'Photo cards'
      instructions: 'Pick up to three entries. Pages show their title and a "N Tours" chip (handy for the Guided + Self-Guided pillar cards). Guided / Self-guided tours show their name and region chip.'
  -
    handle: buttons
    field: buttons.buttons
    config:
      display: 'Trailing button'
      instructions: 'Optional button under the cards (e.g. "Browse all tours").'
      max_sets: 1
  -
    import: section_settings_with_dark
