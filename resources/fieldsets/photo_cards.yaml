title: 'Photo cards'
fields:
  -
    handle: heading
    field:
      type: text
      localizable: true
      display: Heading
      default: 'Choose your adventure'
  -
    handle: photo_cards
    field:
      type: entries
      collections:
        - pages
        - guided
        - self-guided
      max_items: 4
      display: 'Photo cards'
      instructions: 'Pick up to four entries. Tour listings pages show the number of tours. Guided and Self-Guided tours show their name and region.'
  -
    handle: buttons
    field: buttons.buttons
    config:
      display: Button
      instructions: 'Optional button under the cards (e.g. "Browse all tours").'
      max_sets: 1
  -
    import: section_settings_with_dark
