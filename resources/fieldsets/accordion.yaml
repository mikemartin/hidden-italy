title: Accordion
fields:
  -
    handle: title
    field:
      type: text
      localizable: true
      display: Heading
      instructions: 'Heading shown on the closed accordion row (e.g. ''5a. Changes by You'').'
      validate:
        - required
  -
    handle: body
    field:
      type: bard
      localizable: true
      display: Body
      buttons:
        - h3
        - h4
        - bold
        - italic
        - unorderedlist
        - orderedlist
        - removeformat
        - quote
        - anchor
      link_collections:
        - pages
        - guided
        - self-guided
      container: files
      remove_empty_nodes: true
      smart_typography: true
      validate:
        - required
