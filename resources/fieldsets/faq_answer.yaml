title: 'FAQ answer'
# Shared Bard answer config — used by both the page-builder FAQs grid
# (inline questions) and the Questions collection blueprint (common
# questions). Defining it once means Statamic augments the value the
# same way in both contexts, so `_faq_accordion_item.antlers.html` can
# iterate Bard sets uniformly.
fields:
  -
    handle: answer
    field:
      buttons:
        - bold
        - italic
        - unorderedlist
        - orderedlist
        - removeformat
        - quote
        - anchor
        - table
      link_collections:
        - pages
        - guided
        - self-guided
      remove_empty_nodes: false
      type: bard
      display: Answer
      sets:
        walking_grades_table:
          display: 'Walking grades table'
          instructions: 'Inserts the walking-grades table from globals.'
          icon: list
          fields:
            -
              handle: tour_type
              field:
                type: button_group
                display: 'Tour Type'
                default: both
                options:
                  self-guided: 'Self-guided'
                  guided: Guided
                  both: Automatic
                instructions: 'Display [walking grades](/cp/globals/walking_grades) by Tour Type, or pick `Automatic` and we''ll show the right ones automatically.'
