title: 'Tour types'
fields:
  -
    handle: heading
    field:
      type: text
      localizable: true
      display: Heading
      default: 'Choose your adventure'
  -
    handle: tour_types
    field:
      type: entries
      collections:
        - pages
      max_items: 2
      display: 'Tour Types'
      instructions: 'Pick the two pages this section links to (typically Guided + Self-Guided). Each card uses the page''s title, URL, and Card image.'
  -
    handle: buttons
    field: buttons.buttons
    config:
      display: 'Trailing button'
      instructions: 'Optional button under the cards (e.g. "Browse all tours").'
      max_sets: 1
