title: 'Featured tours'
fields:
  -
    handle: heading
    field:
      type: text
      localizable: true
      display: Heading
      default: 'Featured walking tours'
      width: 66
  -
    handle: link_text
    field:
      type: text
      localizable: true
      display: 'View all label'
      default: 'View all'
      width: 33
  -
    handle: link_entry
    field:
      type: entries
      localizable: true
      display: 'View all entry'
      collections:
        - pages
      max_items: 1
      instructions: 'Select the page this link points to (e.g. the Tours index).'
  -
    handle: tours
    field:
      type: entries
      localizable: true
      display: Tours
      collections:
        - guided
        - self-guided
      max_items: 6
      instructions: 'Pick three tours to feature.'
      validate:
        - required
  -
    import: section_settings
