message_body: |-
  Dear Hidden Italy team,
  My name is Sabrina Barrera and I manage Locanda Dal Brascin, a mountain inn in Corio, in the Val Malone valley, close to the Valli di Lanzo — the area your "Trails to Freedom" itinerary passes through on sections of the GTA.
  I wanted to introduce our inn as a possible accommodation option for future itineraries in this area: 16 rooms (up to 26 beds), open year-round, direct access to the local trail network and the wider 200+ km network maintained by ASAVM, plus e-bike rental and guided tours on site.
  I've attached a technical fact sheet with full details on rooms, services for walkers, and trade terms. I'd be very happy to discuss further if useful for your route planning.
  Kind regards,
  Sabrina Barrera
  Locanda Dal Brascin
  info@locandadalbrascin.com / sabrinabarreracorsi@gmail.com
