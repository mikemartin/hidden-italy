message_body: |-
  1 person (me). I'd pay single supplement. Either date in May 2027 is fine.

  I did a wonderful self-guided walk with you in the Dolomites in 2023 and have wanted to do another. I am interested in Puglia. My concern is my age (81 by then) and not wanting to be a liability in the group.

  I'm a healthy 80 and in good shape due to regular walking, gym and pilates. I've done a number of group walking holidays (most recently Queen Charlotte Track NZ in 2025). I feel slow now, particularly on the hills but looking at your itinerary, it seems manageable. Also, that if necessary it would be possible to take a day off walking as the accommodation includes two 4-night stays. Is that correct? Not that I'd be wanting to do that.

  I know you can't give me a definitive answer, but any comments about the likely demographics of the group would be helpful. Kind regards. (Patricia) Mary Rose-Miller.
