message_body: |-
  One person (me), single supplement, either tour date in May 2027.

  I did a wonderful self-guided walk with Hidden Italy in the Dolomites in 2023.

  My concern relates to my age (81 by then) and how that fits with the likely demographics of the group, in terms of walking capacity and speed. I am a healthy 80 yr old, accustomed to regular walking, gym and pilates. I have been on a number of walking holidays, most recently the Queen Charlotte Track NZ in 2024. I am slow going uphill now.

  From the itinerary, it seems that there are 4 night stay twice, which presumably means I could pull out of day's walking, if need be, not that I'd be planning to do that.

  I know you can't give any definitive answer, but your response would be helpful.

  Regards. Mary.
