overview: "From even tracks to steep climbs, find the walk that's right for you. Please consider these carefully before booking."
grade_1_self_guided: 'Most of the walks on this tour are less than 12 kms (three hours walking); follow even tracks; and there are no long, steep climbs.'
grade_1_guided: 'This walk is less than 12 kms (three hours walking); it follows even tracks; and there are no long, steep climbs.'
grade_2_self_guided: 'Several walks on this tour are between 12 and 15 kms (three to four hours walking); you follow even tracks; and there are some long climbs.'
grade_2_guided: 'This walk is between 12 and 15 kms (three to four hours walking); we follow even tracks and there are some long climbs.'
grade_3_self_guided: 'Several walks on this tour are between 12 and 15 kms (three to four hours walking); parts of the trail have rough terrain; and there are some long, steep climbs.'
grade_3_guided: 'This walk is between 12 and 15 kms (three to four hours walking); we cross some rough terrain; and there are some long, steep climbs.'
grade_4_self_guided: 'Several walks on this tour are longer than 15 kms (four hours plus walking); you cross some rough terrain; and there are some long, steep climbs.'
grade_4_guided: 'This walk is longer than 15 kms (four hours plus walking); we cross some rough terrain; and there are some long, steep climbs.'
grade_5_guided: "While it follows well-marked trails this is a strenuous hike because of the weight you’ll be carrying; the daily distances walked; there are high ascents and long descents on several walks; the surfaces that you will encounter in sections are rough and there is some rock-hopping and scrambling."
