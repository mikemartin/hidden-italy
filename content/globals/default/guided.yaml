walking_benefits_heading: 'Why use our guided walking tours?'
walking_benefits_intro: |
  Our guided tours are a unique way to discover a side of this fascinating country that most people only read about. The pace is relaxed (it is a holiday after all) which gives you plenty of time to unpack and soak up the atmosphere of the places we visit.
